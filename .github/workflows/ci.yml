name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Import smoke test
        run: |
          python -c "from app.agent import build_agent; from app.tools import get_tools; from app.llm import PROVIDERS; print('OK', list(PROVIDERS))"
